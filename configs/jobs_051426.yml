# ==========================================================
# GLOBAL DEFAULTS
# ==========================================================
defaults:

  # Where compiled SQL templates live
  sql_templates_dir: sql_templates

  # Where Excel outputs are written
  output_dir: C:/Users/nathan.taylor/Asurion/Coaching & Technology - BPC Data/Proposed_Cohorts

   # Log directory
  log_dir: logs

   # Optional global behavior flags
  apply_site_exclusions_by_default: true

# ==========================================================
# JOB DEFINITIONS
# ==========================================================
jobs:

    # ======================================================
    # 1 Mcafee – CRT
    # ======================================================
- name: Mcafee_CRT

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: McAfee
    metric: CRT
    cohort_id: '20'
    date_start: '2026-05-01'
    date_end: '2026-05-15'

  coaching_override: Efficient Issue Resolution
  reference_link: https://app.prod-uswest04.observe.ai/reporting-dashboard/111

  validity:
    denominator_limit: 10

  eligibility:
    site_exclude_contains: ["trn"]
    filters: []

  selection:
    outlier_limit_target: calc
    outlier_limit: 2000
    metric_direction: lower_is_good
    outlier_side: worst

  comparisons: []

    # ======================================================
    # 2 Mcafee – Cancel Rate
    # ======================================================
- name: Mcafee_Cancel

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: McAfee
    metric: cancellation rate
    cohort_id: '20'
    date_start: '2026-05-01'
    date_end: '2026-05-15'

  coaching_override: Cancel Rate Reduction
  reference_link: https://app.powerbi.com/groups/me/reports/0109b8aa-01a4-4f93-8457-2d588b64e1a

  validity:
    denominator_limit: 1

  eligibility:
    site_exclude_contains: ["trn"]
    filters: []

  selection:
    outlier_limit_target: percentile
    outlier_limit: 0.8
    metric_direction: lower_is_good
    outlier_side: worst

  comparisons: []

  # ======================================================
  # 10 VZW SOL – Quality Sales Noncompliant
  # ======================================================
- name: VZW_SOL_Quality_Sales_Noncompliant

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: PSS-Verizon
    metric: nsp100
    cohort_id: '7'
    date_start: '2026-05-01'
    date_end: '2026-05-15'

  coaching_override: Quality Sales - Smart Offer
  reference_link: https://app.powerbi.com/groups/me/reports/30d76537-2dea-4dc8-a2ea-b1d085303f15?ctid=64e5ad32-cb04-44df-8896-bed5d7792429&pbi_source=linkShare
  
  validity:
    denominator_limit: 50
  
  eligibility:
    site_exclude_contains: ["trn"]
    filters:  []
  
  selection:
    outlier_limit_target: percentile
    outlier_limit: .66
    metric_direction: higher_is_good
    outlier_side: best
  
  output:
    filter_to_comparison_outliers: smart_offer
    promote_comparison_metrics: smart_offer
    keep_original_primary_metrics: true

  comparisons: 
  - name: smart_offer

    query:
      query_type: smart_offer
      sql_template: Smart_offer_data_filtered.sql

    inputs_override:
      metric: "Smart Offer"
      client: "V"
      business_unit: "S"

    join:
      on: ["expert_id"]
      how: left

    selection:
      outlier_limit_target: calc
      outlier_limit: 0.6
      metric_direction: higher_is_good
      outlier_side: worst

