# ==========================================================
# GLOBAL DEFAULTS
# ==========================================================
defaults:

  # Where compiled SQL templates live
  sql_templates_dir: sql_templates

  # Where Excel outputs are written
  output_dir: C:/Users/nathan.taylor/Asurion/Coaching & Technology - BPC Data/Proposed_Cohorts

   # Log directory
  log_dir: logs

   # Optional global behavior flags
  apply_site_exclusions_by_default: true

# ==========================================================
# JOB DEFINITIONS
# ==========================================================
jobs:

  # ======================================================
  # 10 ATT SOL – CRT/NPS
  # ======================================================
- name: ATT_SOL_CRT_NPS

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: PSS-AT&T
    metric: CRT
    cohort_id: '10'
    date_start: '2026-06-19'
    date_end: '2026-07-03'

  coaching_override: Efficient Experience
  reference_link: https://app.powerbi.com/groups/me/reports/30d76537-2dea-4dc8-a2ea-b1d085303f15?ctid=64e5ad32-cb04-44df-8896-bed5d7792429&pbi_source=linkShare
  
  validity:
    denominator_limit: 10
  
  eligibility:
    site_exclude_contains: ["trn"]
    filters: []
  
  selection:
    outlier_limit_target: percentile
    outlier_limit: 0.5
    metric_direction: lower_is_good
    outlier_side: worst
  
  output:
    filter_to_comparison_outliers: NPS
    promote_comparison_metrics: NPS
    keep_original_primary_metrics: true

  comparisons: 
  - name: NPS

    query:
      query_type: metric
      sql_template: epm_metric_data_generic_filtered.sql

    inputs_override: []

    join:
      on: ["expert_id"]
      how: left

    selection:
      outlier_limit_target: percentile
      outlier_limit: 0.5
      metric_direction: higher_is_good
      outlier_side: worst      

  enrichments:
  - name: recording_link
    query:
      query_type: recording
      sql_template: long_call_recording_links.sql
    inputs_override:
      client: "AT&T"
      business_unit: "Soluto"
      date_start: '2026-06-19'
      date_end: '2026-07-03'
      min_outdial_seconds: 1500
    join:
      on: ["expert_id"]
      how: left
    map_columns:
      recording_link: recording_link        
     