# ==========================================================
# GLOBAL DEFAULTS
# ==========================================================
defaults:
  # Where compiled SQL templates live
  sql_templates_dir: sql_templates

  # Where Excel outputs are written
  output_dir: "C:/Users/nathan.taylor/Asurion/Coaching & Technology - BPC Data/Proposed_Cohorts"

  # Log directory
  log_dir: logs

  # Optional global behavior flags
  apply_site_exclusions_by_default: true

# ==========================================================
# JOB DEFINITIONS
# ==========================================================
jobs:

  # ======================================================
  # 1️⃣ ATT MOB – Hold Time (Percentile Outlier Model)
  # ======================================================
  - name: ATT_MOB_hold_time

    query:
      query_type: metric
      sql_template: epm_metric_data_generic.sql
      extra_params: {}

    inputs:
      client: "MOB-AT&T"
      metric: "Hold Time"
      cohort_id: "1"
      date_start: "2026-01-30"
      date_end: "2026-02-13"

    validity:
      denominator_limit: 10              # standard “den >= 10”
      #calc_limit: null                   # optional future (ex: require non-null calc)

    eligibility:
      site_exclude_contains: ["trn"]      # ✅ substring match (NOT suffix-only)
      filters:
      #- column: talk_time_seconds
      #  op: ">="
      #  value: 2000

    outliers:
      denominator_limit: 10
      outlier_limit_target: percentile
      outlier_limit: 0.75
      metric_direction: lower_is_good
      outlier_side: worst

    comparisons:
    - name: hold_time
      query:
        query_type: metric
        sql_template: epm_metric_data_generic_filtered.sql   # includes expert_id IN :expert_ids
      inputs_override:
        metric: "Hold Time"
      selection:
        outlier_limit_target: percentile
        outlier_limit: 0.90
        metric_direction: lower_is_good
        outlier_side: worst  

    coaching_override: "AHT Hold Time"
    reference_link: "https://app.powerbi.com/groups/me/reports/hold_time"

  # ======================================================
  # 2️⃣ ATT MOB – Talk Time 
  # ======================================================
  - name: ATT_MOB_talk_time

    query:
      query_type: metric
      sql_template: epm_metric_data_generic.sql

    inputs:
      client: "MOB-AT&T"
      metric: "Talk Time"
      cohort_id: "1"
      date_start: "2026-01-30"
      date_end: "2026-02-13"

    filters:
      exclude_site_suffixes: ["trn"]

    outliers:
      denominator_limit: 10
      outlier_limit_target: percentile
      outlier_limit: 0.75
      metric_direction: lower_is_good
      outlier_side: worst

    coaching_override: "AHT Talk Time"
    reference_link: "https://app.powerbi.com/groups/me/reports/hold_time"


