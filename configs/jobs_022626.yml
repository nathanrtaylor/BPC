  # ======================================================
  # 1️⃣ ATT MOB – Hold Time (Percentile Outlier Model)
  # ======================================================
- name: ATT_MOB_hold_time

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql
    extra_params: {}

  inputs:
    client: MOB-AT&T
    metric: Hold Time
    cohort_id: '3'
    date_start: '2026-02-13'
    date_end: '2026-02-27'

  coaching_override: AHT Hold Time
  reference_link: https://app.powerbi.com/groups/me/reports/9cf56cf7-2d0d-4c8b-bb8a-b3faed06c4be/ReportSection2ba329c33808b7b666c2?ctid=64e5ad32-cb04-44df-8896-bed5d7792429&experience=power-bi&clientSideAuth=0&bookmarkGuid=e929be17-0048-4c55-b608-281f82cd1896

  validity:
    denominator_limit: 10

  eligibility:
    site_exclude_contains: ["trn"]
    filters: []

  selection:
    outlier_limit_target: percentile
    outlier_limit: 0.75
    metric_direction: lower_is_good
    outlier_side: worst

  comparisons: []

