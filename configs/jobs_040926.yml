# ==========================================================
# GLOBAL DEFAULTS
# ==========================================================
defaults:

  # Where compiled SQL templates live
  sql_templates_dir: sql_templates

  # Where Excel outputs are written
  output_dir: C:/Users/nathan.taylor/Asurion/Coaching & Technology - BPC Data/Proposed_Cohorts

   # Log directory
  log_dir: logs

   # Optional global behavior flags
  apply_site_exclusions_by_default: true

# ==========================================================
# JOB DEFINITIONS
# ==========================================================
jobs:

    # ======================================================
    # 1 Mcafee – CRT
    # ======================================================
- name: Mcafee_CRT

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: McAfee
    metric: CRT
    cohort_id: '15'
    date_start: '2026-03-27'
    date_end: '2026-04-10'

  coaching_override: Efficient Issue Resolution
  reference_link: https://app.prod-uswest04.observe.ai/reporting-dashboard/111

  validity:
    denominator_limit: 10

  eligibility:
    site_exclude_contains: ["trn"]
    filters: []

  selection:
    outlier_limit_target: calc
    outlier_limit: 2000
    metric_direction: lower_is_good
    outlier_side: worst

  comparisons: []

    # ======================================================
    # 2 Mcafee – Cancel Rate
    # ======================================================
- name: Mcafee_Cancel

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: McAfee
    metric: cancellation rate
    cohort_id: '15'
    date_start: '2026-03-27'
    date_end: '2026-04-10'

  coaching_override: Cancel Rate Reduction
  reference_link: https://app.powerbi.com/groups/me/reports/0109b8aa-01a4-4f93-8457-2d588b64e1a

  validity:
    denominator_limit: 1

  eligibility:
    site_exclude_contains: ["trn"]
    filters: []

  selection:
    outlier_limit_target: percentile
    outlier_limit: 0.8
    metric_direction: lower_is_good
    outlier_side: worst

  comparisons: []

  # ======================================================
  # 3 VZW SOL – Sentiment (ERP)
  # ======================================================
- name: VZW_SOL_Sentiment

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: PSS-Verizon
    metric: erp
    cohort_id: '18'
    date_start: '2026-03-27'
    date_end: '2026-04-10'

  coaching_override: Sentiment
  reference_link: https://app.powerbi.com/links/3V-89eNz-H?ctid=64e5ad32-cb04-44df-8896-bed5d7792429&pbi_source=linkShare

  validity:
    denominator_limit: 2

  eligibility:
    site_exclude_contains: ["trn"]
    filters: []

  selection:
    outlier_limit_target: calc
    outlier_limit: 90
    metric_direction: higher_is_good
    outlier_side: worst

  comparisons: []

   

  # ======================================================
  #  4 VZW SOL – CRT Holdtime - Mustangs
  # ======================================================
- name: VZW_SOL_CRT_Holdtime_Mustangs

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: PSS-Verizon
    metric: "Hold Time"
    cohort_id: '2'
    date_start: '2026-03-27'
    date_end: '2026-04-10'

  coaching_override: CRT Holdtime
  reference_link: https://app.powerbi.com/groups/me/reports/30d76537-2dea-4dc8-a2ea-b1d085303f15?ctid=64e5ad32-cb04-44df-8896-bed5d7792429&pbi_source=linkShare

  validity:
    denominator_limit: 10

  eligibility:
    site_exclude_contains: ["trn"]
    filters:  
      - column: site
        op: "=="
        value: mustangs

  selection:
    outlier_limit_target: percentile
    outlier_limit: 0.66
    metric_direction: lower_is_good
    outlier_side: worst

  output: []

  comparisons: []

  enrichments:
    - name: recording_link
      query:
        query_type: recording
        sql_template: outdial_recording_links.sql
      inputs_override:
        client: "Verizon"
        business_unit: "Soluto"
        date_start: "2026-03-27"
        date_end: "2026-04-10"
        min_outdial_seconds: 90
      join:
        on: ["expert_id"]
        how: left
      map_columns:
        recording_link: recording_link  

