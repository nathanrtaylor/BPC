  # ======================================================
  # 10 VZW SOL – Quality Sales Noncompliant Mustangs
  # ======================================================
- name: VZW_SOL_Quality_Sales_Noncompliant_Mustangs

  query:
    query_type: metric
    sql_template: epm_metric_data_generic.sql

  inputs:
    client: PSS-Verizon
    metric: nsp100
    cohort_id: '2'
    date_start: '2026-03-27'
    date_end: '2026-04-10'

  coaching_override: Quality Sales - Smart Offer
  reference_link: https://app.powerbi.com/groups/me/reports/30d76537-2dea-4dc8-a2ea-b1d085303f15?ctid=64e5ad32-cb04-44df-8896-bed5d7792429&pbi_source=linkShare
  
  validity:
    denominator_limit: 50
  
  eligibility:
    site_exclude_contains: ["trn"]
    filters:  
      - column: site
        op: "=="
        value: mustangs
  
  selection:
    outlier_limit_target: percentile
    outlier_limit: 0.66
    metric_direction: higher_is_good
    outlier_side: best
  
  output:
    filter_to_comparison_outliers: smart_offer
    promote_comparison_metrics: smart_offer
    keep_original_primary_metrics: true

  comparisons: 
  - name: smart_offer

    query:
      query_type: smart_offer
      sql_template: Smart_offer_data_filtered.sql

    inputs_override:
      metric: "Smart Offer"
      client: "V"
      business_unit: "S"

    join:
      on: ["expert_id"]
      how: left

    selection:
      outlier_limit_target: calc
      outlier_limit: 0.6
      metric_direction: higher_is_good
      outlier_side: worst

